<!DOCTYPE html>
<html>
<head>

    <title>{{ product.name }}</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:40px;
        }

        .box{
            background:white;
            max-width:500px;
            margin:auto;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        img{
            width:100%;
            border-radius:10px;
        }

        h1{
            margin-top:20px;
        }

        .price{
            color:green;
            font-size:25px;
            font-weight:bold;
        }

        button{
            width:100%;
            padding:12px;
            background:black;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="box">

        <img src="{{ product.image }}">

        <h1>{{ product.name }}</h1>

        <p>{{ product.description }}</p>

        <p class="price">₹ {{ product.price }}</p>

        <a href="/add-to-cart/{{ product.id }}/">
            <button>Add To Cart</button>
        </a>

    </div>

</body>
</html>
