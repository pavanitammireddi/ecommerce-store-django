<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <style>

       body
       {
           margin:0;
           padding:0;
           font-family:Arial, sans-serif;
           background:linear-gradient(135deg,#141e30,#243b55);
           height:100vh;
           display:flex;
           justify-content:center;
           align-items:center;
         }

      .box
         {
             width:380px;
             background:white;
             padding:35px;
             border-radius:15px;
             box-shadow:0 10px 25px rgba(0,0,0,0.3);
            transition:0.3s;
           }

     h1{
        text-align:center;
        margin-bottom:25px;
       color:#141e30;
      }

      input
     {
       width:100%;
       padding:12px;
       margin-top:12px;
       border:1px solid #ccc;
       border-radius:8px;
       box-sizing:border-box;
     }

     input:focus
     {
       outline:none;
       border-color:#2563eb;
     }

     button
     {
       width:100%;
       padding:12px;
       margin-top:20px;
       background:#2563eb;
       color:white;
       border:none;
       border-radius:8px;
       cursor:pointer;
       font-size:16px;
     }

     button:hover
     {
       background:#1d4ed8;
     }

     .error
     {
       color:red;
       text-align:center;
     }

     p
     {
       text-align:center;
     }

     a
     {
       color:#2563eb;
       text-decoration:none;
       font-weight:bold;
     }

     a:hover
     {
       text-decoration:underline;
     }
     .box:hover
     {
       transform:translateY(-5px);
       
     }
     @media(max-width:480px)
     {
       .box
        {
         width:90%;
         padding:25px;
         transition:0.3s;
        }
     }
     .show-password
     {
       display:flex;
      align-items:center;
      gap:8px;
      margin-top:10px;
     }
     
</style>

</head>

<body>

<div class="box">

    <h1>Welcome Back 👋</h1>

    {% for message in messages %}

        <p class="error">
            {{ message }}
        </p>

    {% endfor %}

    <form method="POST">

        {% csrf_token %}

       <input type="text"
              name="username"
              placeholder="Enter Username"
              required>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>
        <div class="show-password">
             <input type="checkbox"
                onclick="showPassword()"
                style="width:auto;">

             <span>Show Password</span>
        </div>

        <button type="submit">
              Sign In
         </button>
        <p style="text-align:center; margin-top:15px;">
            Don't have an account?
          <a href="/register/">Create Account</a>
       </p>
    </form>

</div>
<script>
function showPassword(){
    let pwd = document.querySelector('input[name="password"]');

    if(pwd.type === "password"){
        pwd.type = "text";
    }
    else{
        pwd.type = "password";
    }
}
</script>
</body>

</html>
