<!DOCTYPE html>
<html>

<head>
    <title>My Cart</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#eef2f7;
            margin:0;
            padding:30px;
        }

        .cart-box{
            max-width:800px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#141e30;
            margin-bottom:30px;
        }

        .item{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 0;
            border-bottom:1px solid #ddd;
        }

        .product-name{
            color:#111827;
            margin-bottom:10px;
        }

        .quantity-box{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .qty-btn{
            width:35px;
            height:35px;
            border:none;
            background:#2563eb;
            color:white;
            border-radius:6px;
            cursor:pointer;
            font-size:18px;
        }

        .qty-btn:hover{
            background:#1d4ed8;
        }

        .price{
            color:green;
            font-weight:bold;
            font-size:20px;
            margin-bottom:10px;
        }

        .remove-link{
            color:red;
            text-decoration:none;
            font-weight:bold;
        }

        .remove-link:hover{
            text-decoration:underline;
        }

        .total{
            text-align:right;
            font-size:28px;
            font-weight:bold;
            color:green;
            margin-top:25px;
        }

        .order-btn{
            width:100%;
            padding:15px;
            margin-top:25px;
            border:none;
            border-radius:10px;
            background:#16a34a;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        .order-btn:hover{
            background:#15803d;
        }

        .empty-cart{
            text-align:center;
            font-size:20px;
            color:#666;
            padding:40px;
        }

        .back-btn{
            display:inline-block;
            margin-bottom:20px;
            text-decoration:none;
            color:#2563eb;
            font-weight:bold;
        }

        .back-btn:hover{
            text-decoration:underline;
        }

        @media(max-width:768px){

            .item{
                flex-direction:column;
                align-items:flex-start;
                gap:15px;
            }

            .total{
                text-align:left;
            }
        }

    </style>

</head>

<body>

<div class="cart-box">

    <a href="/" class="back-btn">← Continue Shopping</a>

    <h1>🛒 My Cart</h1>

    {% if cart_items %}

        {% for item in cart_items %}

        <div class="item">

            <div>

                <h3 class="product-name">
                    {{ item.product.name }}
                </h3>

                <div class="quantity-box">

                    <a href="/decrease/{{ item.id }}/">
                        <button class="qty-btn">-</button>
                    </a>

                    <strong>{{ item.quantity }}</strong>

                    <a href="/increase/{{ item.id }}/">
                        <button class="qty-btn">+</button>
                    </a>

                </div>

            </div>

            <div>

                <p class="price">
                    ₹ {{ item.product.price }}
                </p>

                <a href="/remove/{{ item.id }}/"
                   class="remove-link">
                   Remove
                </a>

            </div>

        </div>

        {% endfor %}

        <div class="total">
            Total: ₹ {{ total }}
        </div>

        <a href="/place-order/">
            <button class="order-btn">
                Place Order
            </button>
        </a>

    {% else %}

        <div class="empty-cart">
            🛒 Your cart is empty
        </div>

    {% endif %}

</div>

</body>

</html>
